services:
  - type: web
    name: site-labgen-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://SEU-USUARIO.github.io
      - key: DATABASE_PATH
        value: /var/data/site_labgen.db
